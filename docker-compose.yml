services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: audrique
      POSTGRES_USER: audrique
      POSTGRES_PASSWORD: audrique_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audrique"]
      interval: 5s
      timeout: 3s
      retries: 5

  audrique:
    build: .
    ports:
      - "4200:4200"
    volumes:
      # Persist test artifacts, auth sessions, and suite files
      - ./test-results:/app/test-results
      - ./playwright-report:/app/playwright-report
      - ./.auth:/app/.auth
      - ./scenarios:/app/scenarios
      - ./instances:/app/instances
      - ./.models:/app/.models
    env_file:
      - .env
    environment:
      - PW_HEADLESS=true
      - PW_USE_FAKE_MEDIA=true
      - DATABASE_URL=postgres://audrique:audrique_dev@postgres:5432/audrique
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - JWT_SECRET
      - RESEND_API_KEY
      - TURNSTILE_SECRET_KEY
      - AUTH_BASE_URL=${AUTH_BASE_URL:-http://localhost:4200}
    depends_on:
      postgres:
        condition: service_healthy
    # Required for Chromium sandboxing in Docker
    security_opt:
      - seccomp=unconfined
    # Shared memory for Chromium (default 64MB is too small)
    shm_size: "1gb"

  # Internal admin dashboard (not publicly exposed)
  # Usage: docker compose --profile admin up admin
  admin:
    build: .
    command: ["node", "webapp/admin/server.mjs"]
    ports:
      - "4201:4201"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://audrique:audrique_dev@postgres:5432/audrique
      - AUTH_ENABLED=true
      - JWT_SECRET=${JWT_SECRET:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - AUTH_BASE_URL=${AUTH_BASE_URL:-http://localhost:4200}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - admin

  # Run a test suite instead of Studio
  # Usage: docker compose run --rm test
  test:
    build: .
    command: ["node", "bin/audrique.mjs", "run"]
    volumes:
      - ./test-results:/app/test-results
      - ./playwright-report:/app/playwright-report
      - ./.auth:/app/.auth
      - ./scenarios:/app/scenarios
      - ./instances:/app/instances
      - ./.models:/app/.models
    env_file:
      - .env
    environment:
      - PW_HEADLESS=true
      - PW_USE_FAKE_MEDIA=true
      - PW_VIDEO_MODE=on
      - DATABASE_URL=postgres://audrique:audrique_dev@postgres:5432/audrique
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - seccomp=unconfined
    shm_size: "1gb"
    profiles:
      - test

  # Pre-flight connectivity check
  # Usage: docker compose run --rm doctor
  doctor:
    build: .
    command: ["node", "scripts/doctor.mjs"]
    env_file:
      - .env
    security_opt:
      - seccomp=unconfined
    profiles:
      - tools

volumes:
  pgdata:
