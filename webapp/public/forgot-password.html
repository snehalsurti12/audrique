<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audrique Studio — Reset Password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1d2e;
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 12px;
      padding: 2.5rem;
      max-width: 400px;
      width: 90%;
    }
    .card h2 { font-size: 1.3rem; margin-bottom: 0.3rem; text-align: center; }
    .card .subtitle {
      color: #94a3b8;
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #94a3b8;
      margin-bottom: 0.3rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.65rem 0.75rem;
      background: #0f1117;
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    .btn-submit {
      width: 100%;
      padding: 0.7rem;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .success-msg {
      text-align: center;
      color: #34d399;
      padding: 1rem 0;
    }
    .success-msg p { color: #94a3b8; margin-top: 0.5rem; font-size: 0.85rem; }
    .links {
      margin-top: 1.2rem;
      text-align: center;
      font-size: 0.8rem;
      color: #64748b;
    }
    .links a { color: #818cf8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Reset Password</h2>
    <p class="subtitle">Enter your email and we'll send a reset link</p>

    <form id="forgot-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@company.com" />
      </div>
      <button type="submit" class="btn-submit" id="btn-submit">Send Reset Link</button>
    </form>

    <div id="success" style="display:none">
      <div class="success-msg">
        <h3>Check your email</h3>
        <p>If an account with that email exists, we've sent a password reset link.</p>
      </div>
    </div>

    <div class="links">
      <a href="/login.html">Back to login</a>
    </div>
  </div>

  <script>
    const form = document.getElementById("forgot-form");
    const btn = document.getElementById("btn-submit");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = "Sending...";

      try {
        await fetch("/api/auth/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: document.getElementById("email").value.trim() }),
        });
      } catch {}

      // Always show success (don't reveal if email exists)
      form.style.display = "none";
      document.getElementById("success").style.display = "";
    });
  </script>
</body>
</html>
