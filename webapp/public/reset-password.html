<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audrique Studio — New Password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1d2e;
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 12px;
      padding: 2.5rem;
      max-width: 400px;
      width: 90%;
    }
    .card h2 { font-size: 1.3rem; margin-bottom: 0.3rem; text-align: center; }
    .card .subtitle {
      color: #94a3b8;
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #94a3b8;
      margin-bottom: 0.3rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.65rem 0.75rem;
      background: #0f1117;
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    .pw-hint { font-size: 0.75rem; color: #64748b; margin-top: 0.3rem; }
    .btn-submit {
      width: 100%;
      padding: 0.7rem;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: #f87171;
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .success-msg { text-align: center; padding: 1rem 0; }
    .success-msg h3 { color: #34d399; margin-bottom: 0.5rem; }
    .success-msg a { color: #818cf8; text-decoration: none; }
    .links {
      margin-top: 1.2rem;
      text-align: center;
      font-size: 0.8rem;
      color: #64748b;
    }
    .links a { color: #818cf8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Set New Password</h2>
    <p class="subtitle">Choose a new password for your account</p>

    <div class="error-msg" id="error"></div>

    <form id="reset-form">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="Enter new password" />
        <p class="pw-hint">Min 10 characters, with uppercase, lowercase, and a digit</p>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm New Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" placeholder="Confirm new password" />
      </div>
      <button type="submit" class="btn-submit" id="btn-submit">Update Password</button>
    </form>

    <div id="success" style="display:none">
      <div class="success-msg">
        <h3>Password Updated</h3>
        <p style="color: #94a3b8; margin-bottom: 1rem;">You can now sign in with your new password.</p>
        <a href="/login.html">Go to login</a>
      </div>
    </div>

    <div class="links">
      <a href="/login.html">Back to login</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token") || "";
    const form = document.getElementById("reset-form");
    const errorEl = document.getElementById("error");
    const btn = document.getElementById("btn-submit");

    if (!token) {
      errorEl.textContent = "Invalid reset link. Please request a new password reset.";
      errorEl.style.display = "block";
      btn.disabled = true;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.style.display = "none";

      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirmPassword").value;

      if (password !== confirm) {
        errorEl.textContent = "Passwords do not match";
        errorEl.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Updating...";

      try {
        const resp = await fetch("/api/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password }),
        });

        const data = await resp.json();

        if (resp.ok && data.success) {
          form.style.display = "none";
          document.getElementById("success").style.display = "";
        } else {
          errorEl.textContent = data.error || "Password reset failed";
          errorEl.style.display = "block";
        }
      } catch (err) {
        errorEl.textContent = "Network error. Please try again.";
        errorEl.style.display = "block";
      }

      btn.disabled = false;
      btn.textContent = "Update Password";
    });
  </script>
</body>
</html>
