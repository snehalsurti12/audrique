<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audrique Studio — Accept Invitation</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1d2e;
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 12px;
      padding: 2.5rem;
      max-width: 420px;
      width: 90%;
    }
    .card h2 { font-size: 1.3rem; margin-bottom: 0.3rem; text-align: center; }
    .card .subtitle {
      color: #94a3b8;
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #94a3b8;
      margin-bottom: 0.3rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.65rem 0.75rem;
      background: #0f1117;
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    .form-group input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .role-badge {
      display: inline-block;
      background: rgba(99, 102, 241, 0.15);
      color: #818cf8;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .pw-hint {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 0.3rem;
    }
    .turnstile-wrap {
      display: flex;
      justify-content: center;
      margin: 1rem 0;
    }
    .btn-submit {
      width: 100%;
      padding: 0.7rem;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: #f87171;
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .success-msg {
      text-align: center;
      padding: 2rem 0;
    }
    .success-msg h3 { color: #34d399; margin-bottom: 0.5rem; }
    .success-msg a {
      color: #818cf8;
      text-decoration: none;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(99, 102, 241, 0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 2rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .links {
      margin-top: 1.2rem;
      text-align: center;
      font-size: 0.8rem;
      color: #64748b;
    }
    .links a { color: #818cf8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Join Audrique Studio</h2>

    <!-- Loading state while fetching invitation -->
    <div id="loading">
      <p class="subtitle">Loading invitation...</p>
      <div class="spinner"></div>
    </div>

    <!-- Invalid/expired invitation -->
    <div id="invalid" style="display:none">
      <p class="subtitle" style="color: #f87171;">This invitation link is invalid or has expired.</p>
      <div class="links"><a href="/login.html">Go to login</a></div>
    </div>

    <!-- Registration form -->
    <div id="register-section" style="display:none">
      <p class="subtitle">
        You've been invited as <span class="role-badge" id="role-badge"></span>
      </p>

      <div class="error-msg" id="error"></div>

      <form id="register-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" disabled />
        </div>
        <div class="form-group">
          <label for="displayName">Display Name</label>
          <input type="text" id="displayName" name="displayName" required autocomplete="name" placeholder="Jane Doe" maxlength="100" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="Create a password" />
          <p class="pw-hint">Min 10 characters, with uppercase, lowercase, and a digit</p>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" placeholder="Confirm your password" />
        </div>

        <div class="turnstile-wrap">
          <div class="cf-turnstile" data-sitekey="0x4AAAAAACoVhlBLZ8TL7sA7" data-theme="dark" data-callback="onTurnstileSuccess"></div>
        </div>

        <button type="submit" class="btn-submit" id="btn-submit">Create Account</button>
      </form>

      <div class="links"><a href="/login.html">Already have an account? Sign in</a></div>
    </div>

    <!-- Success state -->
    <div id="success" style="display:none">
      <div class="success-msg">
        <h3>Account Created</h3>
        <p style="color: #94a3b8; margin-bottom: 1rem;">You can now sign in to Audrique Studio.</p>
        <a href="/login.html" class="btn-submit" style="display: inline-block; padding: 0.6rem 2rem; text-decoration: none;">Sign In</a>
      </div>
    </div>
  </div>

  <script>
    let turnstileToken = "";
    let inviteToken = "";

    function onTurnstileSuccess(token) { turnstileToken = token; }

    const params = new URLSearchParams(window.location.search);
    inviteToken = params.get("invite") || "";

    // Fetch invitation details
    (async () => {
      if (!inviteToken) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("invalid").style.display = "";
        return;
      }

      try {
        const resp = await fetch(`/api/auth/invitation?token=${encodeURIComponent(inviteToken)}`);
        const data = await resp.json();

        document.getElementById("loading").style.display = "none";

        if (resp.ok && data.email) {
          document.getElementById("email").value = data.email;
          document.getElementById("role-badge").textContent = data.role;
          document.getElementById("register-section").style.display = "";
        } else {
          document.getElementById("invalid").style.display = "";
        }
      } catch {
        document.getElementById("loading").style.display = "none";
        document.getElementById("invalid").style.display = "";
      }
    })();

    // Handle registration
    const form = document.getElementById("register-form");
    const errorEl = document.getElementById("error");
    const btn = document.getElementById("btn-submit");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.style.display = "none";

      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirmPassword").value;

      if (password !== confirm) {
        errorEl.textContent = "Passwords do not match";
        errorEl.style.display = "block";
        return;
      }

      if (!turnstileToken) {
        errorEl.textContent = "Please complete the security challenge";
        errorEl.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Creating account...";

      try {
        const resp = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            inviteToken,
            displayName: document.getElementById("displayName").value.trim(),
            password,
            turnstileToken,
          }),
        });

        const data = await resp.json();

        if (resp.ok && data.success) {
          document.getElementById("register-section").style.display = "none";
          document.getElementById("success").style.display = "";
        } else {
          errorEl.textContent = data.error || "Registration failed";
          errorEl.style.display = "block";
        }
      } catch (err) {
        errorEl.textContent = "Network error. Please try again.";
        errorEl.style.display = "block";
      }

      btn.disabled = false;
      btn.textContent = "Create Account";
    });
  </script>
</body>
</html>
