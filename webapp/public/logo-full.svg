<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240" fill="none">
  <defs>
    <linearGradient id="grad-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#8577ed"/>
    </linearGradient>
    <linearGradient id="grad-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8577ed"/>
      <stop offset="100%" stop-color="#00cec9"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#6c5ce7" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- ── Icon ── -->
  <g transform="translate(20, 10) scale(0.92)">
    <circle cx="120" cy="120" r="112" fill="#0f1117" stroke="url(#grad-primary)" stroke-width="2.5"/>
    <circle cx="120" cy="120" r="102" fill="none" stroke="#1c1f2e" stroke-width="1"/>

    <!-- Ear arcs (left) -->
    <path d="M82 82 C60 105, 55 140, 82 165"
          stroke="url(#grad-accent)" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M70 68 C42 98, 36 148, 70 178"
          stroke="url(#grad-accent)" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.35"/>

    <!-- Central A -->
    <g filter="url(#shadow)">
      <path d="M100 180 L120 68 L122 68"
            stroke="url(#grad-primary)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M120 68 L122 68 L142 180"
            stroke="url(#grad-primary)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- Sound waves (right) -->
    <g filter="url(#glow)">
      <path d="M155 95 C170 110, 170 135, 155 150"
            stroke="#00cec9" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.9"/>
      <path d="M168 82 C190 102, 190 143, 168 163"
            stroke="#00cec9" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.6"/>
      <path d="M180 70 C208 95, 208 150, 180 175"
            stroke="#00cec9" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.35"/>
    </g>

    <!-- Signal dot -->
    <circle cx="121" cy="63" r="3.5" fill="#00cec9" filter="url(#glow)"/>
  </g>

  <!-- ── Wordmark ── -->
  <text x="280" y="148" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="72" font-weight="600" letter-spacing="-1" fill="url(#grad-primary)">
    Audrique
  </text>

  <!-- Tagline -->
  <text x="284" y="185" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="18" font-weight="400" letter-spacing="4" fill="#6b6f8a">
    CONTACT CENTER TESTING
  </text>
</svg>
